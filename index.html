<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Link</title>
<style>
  :root {
    --bg: #f4f1ea;
    --card: #ffffff;
    --ink: #2b2b2b;
    --accent: #3d6b5c;
    --accent-dark: #2b4d42;
    --error: #b3453d;
    --border: #d8d2c4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    padding: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 1.3rem;
    margin: 0 0 8px;
  }
  p.sub {
    color: #666;
    font-size: 0.95rem;
    margin: 0 0 24px;
  }
  input.masked {
    -webkit-text-security: disc;
  }
  input[type="password"], input[type="text"], input[type="url"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 1.1rem;
    border: 2px solid var(--border);
    border-radius: 10px;
    text-align: center;
    outline: none;
    margin-bottom: 14px;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%;
    padding: 12px;
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:hover { background: var(--accent-dark); }
  button:disabled { background: #aaa; cursor: default; }
  .msg {
    min-height: 22px;
    margin-top: 12px;
    font-size: 0.9rem;
  }
  .msg.error { color: var(--error); }
  .msg.success { color: var(--accent-dark); }
  .goLink {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 20px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
  }
  .goLink:hover { background: var(--accent-dark); }

  /* --- setup mode --- */
  .setup textarea {
    width: 100%;
    height: 140px;
    font-family: monospace;
    font-size: 0.8rem;
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    margin-top: 10px;
  }
  .setup label {
    display: block;
    text-align: left;
    font-size: 0.85rem;
    font-weight: 600;
    margin: 14px 0 4px;
  }
  .note {
    font-size: 0.8rem;
    color: #777;
    margin-top: 16px;
    text-align: left;
    line-height: 1.4;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <!-- content injected by script -->
</div>

<script>
/*
  =====================================================================
  HOW THIS WORKS (read this if you're editing the file later)
  =====================================================================
  - The real link is never stored as plain text in this file.
  - Instead it's encrypted (AES-GCM) using a key derived from the
    password itself (via PBKDF2). The encrypted blob below is useless
    without the correct password.
  - A wrong password simply fails to decrypt - there's no separate
    "is this the right password" check for someone to find and bypass.
  - To make a NEW protected link: open this same page with ?setup
    added to the URL (e.g. index.html?setup), fill in the password
    and link, click "Generate", and paste the resulting CONFIG object
    over the one below.
  =====================================================================
*/

// PASTE a generated config object here (see setup mode instructions above).
// This placeholder is non-functional until replaced.
const CONFIG = {
  salt: "UWseGgdI6OT+l8wed3/EAA==",
  iv: "Ii5q+fbIghSiQG8f",
  ciphertext: "hbtZUIv1ffncUCrH3sfDNjJOl1q9mk24CY5Q2fN4HCYPEUrfpsEHNx/Ic2T3EBda2cpzoNR0nPm3q4V4RA7e1NSZxFH5BkcW3LOr1Uz0T6oxV6gZ29QfywT2kqESwR1cOceiIEb2bv5ZEEx6cTz7n9kgLsA="
};

const b64ToBytes = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));
const bytesToB64 = (bytes) => btoa(String.fromCharCode(...new Uint8Array(bytes)));

async function deriveKey(password, saltBytes, usage) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: saltBytes, iterations: 250000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    [usage]
  );
}

async function encryptLink(password, link) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt, "encrypt");
  const enc = new TextEncoder();
  const ciphertext = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv }, key, enc.encode(link)
  );
  return {
    salt: bytesToB64(salt),
    iv: bytesToB64(iv),
    ciphertext: bytesToB64(ciphertext)
  };
}

async function decryptLink(password, config) {
  const salt = b64ToBytes(config.salt);
  const iv = b64ToBytes(config.iv);
  const key = await deriveKey(password, salt, "decrypt");
  const ciphertext = b64ToBytes(config.ciphertext);
  const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
  return new TextDecoder().decode(plainBuf);
}

const card = document.getElementById("card");
const isSetup = new URLSearchParams(location.search).has("setup");

if (isSetup) {
  renderSetup();
} else {
  renderGate();
}

function renderGate() {
  card.innerHTML = `
    <h1>🔒 Enter the class password</h1>
    <p class="sub">Ask your teacher if you don't know it.</p>
    <input type="text" id="pw" class="masked" placeholder="Password" autocomplete="off" spellcheck="false" autocapitalize="off" />
    <button id="go">Go</button>
    <div class="msg" id="msg"></div>
    <div id="result"></div>
  `;
  const pwInput = document.getElementById("pw");
  const btn = document.getElementById("go");
  const msg = document.getElementById("msg");
  const result = document.getElementById("result");

  async function attempt() {
    const pw = pwInput.value;
    if (!pw) return;
    btn.disabled = true;
    msg.textContent = "Checking...";
    msg.className = "msg";
    try {
      const link = await decryptLink(pw, CONFIG);
      msg.textContent = "Correct! Redirecting...";
      msg.className = "msg success";
      result.innerHTML = `<a class="goLink" href="${link}" target="_blank" rel="noopener">Open the link</a>`;
      setTimeout(() => { window.location.href = link; }, 700);
    } catch (e) {
      msg.textContent = "That password isn't right - try again.";
      msg.className = "msg error";
      btn.disabled = false;
      pwInput.value = "";
      pwInput.focus();
    }
  }

  btn.addEventListener("click", attempt);
  pwInput.addEventListener("keydown", (e) => { if (e.key === "Enter") attempt(); });
  pwInput.focus();
}

function renderSetup() {
  card.classList.add("setup");
  card.innerHTML = `
    <h1>⚙️ Generate a protected link</h1>
    <p class="sub">This runs entirely in your browser - nothing is uploaded anywhere.</p>
    <label for="pw">Password students will type</label>
    <input type="text" id="pw" placeholder="e.g. friendly-turtle-42" />
    <label for="link">The real link (e.g. Google Slides edit link)</label>
    <input type="url" id="link" placeholder="https://docs.google.com/presentation/..." />
    <button id="gen">Generate</button>
    <div class="msg" id="msg"></div>
    <textarea id="out" placeholder="Generated CONFIG will appear here" readonly></textarea>
    <div class="note">
      Copy the text above and paste it in place of the <code>const CONFIG = {...}</code>
      block near the top of this file's &lt;script&gt;, then save and publish.
      Remove <code>?setup</code> from the URL when you're done - visitors don't need it.
    </div>
  `;
  const pw = document.getElementById("pw");
  const link = document.getElementById("link");
  const btn = document.getElementById("gen");
  const msg = document.getElementById("msg");
  const out = document.getElementById("out");

  btn.addEventListener("click", async () => {
    if (!pw.value || !link.value) {
      msg.textContent = "Fill in both fields first.";
      msg.className = "msg error";
      return;
    }
    const config = await encryptLink(pw.value, link.value);
    out.value =
`const CONFIG = {
  salt: "${config.salt}",
  iv: "${config.iv}",
  ciphertext: "${config.ciphertext}"
};`;
    msg.textContent = "Done - copy the text below into index.html.";
    msg.className = "msg success";
  });
}
</script>

</body>
</html>
